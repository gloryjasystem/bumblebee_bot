<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bumblebee Pay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.6;
            text-align: center;
            margin-bottom: 32px;
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 340px;
            margin-bottom: 24px;
        }

        .card-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card-row:last-child {
            border-bottom: none;
        }

        .card-label {
            font-size: 13px;
            opacity: 0.6;
        }

        .card-value {
            font-size: 14px;
            font-weight: 600;
        }

        .card-value.highlight {
            color: #4CAF50;
            font-size: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: var(--tg-theme-button-color, #4CAF50);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status-text {
            text-align: center;
            font-size: 14px;
            opacity: 0.7;
            margin-top: 12px;
        }

        .error-box {
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid rgba(244, 67, 54, 0.4);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            width: 100%;
            max-width: 340px;
            display: none;
        }

        .error-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .error-title {
            font-size: 16px;
            font-weight: 600;
            color: #f44336;
            margin-bottom: 4px;
        }

        .error-msg {
            font-size: 13px;
            opacity: 0.7;
        }

        .retry-btn {
            margin-top: 16px;
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .crypto-icons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 16px;
            opacity: 0.5;
            font-size: 12px;
        }

        .crypto-tag {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 4px 8px;
        }
    </style>
</head>

<body>

    <div class="logo">🐝</div>
    <h1>Bumblebee Pay</h1>
    <p class="subtitle">Безопасная оплата тарифа</p>

    <div class="card" id="infoCard" style="display:none">
        <div class="card-row">
            <span class="card-label">Тариф</span>
            <span class="card-value" id="tariffLabel">—</span>
        </div>
        <div class="card-row">
            <span class="card-label">Период</span>
            <span class="card-value" id="periodLabel">—</span>
        </div>
        <div class="card-row">
            <span class="card-label">Сумма</span>
            <span class="card-value highlight" id="amountLabel">—</span>
        </div>
    </div>

    <div class="spinner" id="spinner"></div>
    <p class="status-text" id="statusText">Создаём счёт на оплату...</p>

    <div class="error-box" id="errorBox">
        <div class="error-icon">❌</div>
        <div class="error-title">Ошибка</div>
        <div class="error-msg" id="errorMsg">Не удалось создать счёт</div>
        <button class="retry-btn" onclick="createPayment()">Попробовать снова</button>
    </div>

    <div class="crypto-icons" id="cryptoIcons">
        <span class="crypto-tag">USDT</span>
        <span class="crypto-tag">TON</span>
        <span class="crypto-tag">BTC</span>
        <span class="crypto-tag">ETH</span>
        <span class="crypto-tag">BNB</span>
        <span class="crypto-tag">+100</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const TARIFF_NAMES = {
            start: '🌱 Старт',
            pro: '⭐ Про',
            business: '💼 Бизнес',
        };
        const PRICES = {
            start_month: 9, start_year: 79,
            pro_month: 24, pro_year: 199,
            business_month: 59, business_year: 499,
        };
        const PERIOD_LABELS = { month: 'Месяц', year: 'Год' };

        const params = new URLSearchParams(window.location.search);
        const tariff = params.get('tariff') || 'pro';
        const period = params.get('period') || 'month';

        // Показываем инфо о тарифе
        document.getElementById('tariffLabel').textContent = TARIFF_NAMES[tariff] || tariff;
        document.getElementById('periodLabel').textContent = PERIOD_LABELS[period] || period;
        document.getElementById('amountLabel').textContent = '$' + (PRICES[tariff + '_' + period] || '?');
        document.getElementById('infoCard').style.display = 'block';

        async function createPayment() {
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('statusText').textContent = 'Создаём счёт на оплату...';
            document.getElementById('errorBox').style.display = 'none';

            try {
                const resp = await fetch('/api/create-crypto-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        init_data: tg.initData,
                        tariff: tariff,
                        period: period,
                        currency: 'usd',
                    }),
                });

                const data = await resp.json();

                if (!resp.ok || !data.success) {
                    throw new Error(data.error || 'Сервер вернул ошибку');
                }

                document.getElementById('statusText').textContent = 'Переходим к оплате...';

                // Редирект к NOWPayments внутри WebApp окна
                window.location.href = data.payment_url;

            } catch (err) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('statusText').style.display = 'none';
                document.getElementById('errorMsg').textContent = err.message || 'Попробуйте позже';
                document.getElementById('errorBox').style.display = 'block';
            }
        }

        // Запускаем автоматически
        createPayment();
    </script>
</body>

</html>

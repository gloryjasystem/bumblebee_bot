<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            background: transparent;
        }
    </style>
</head>

<body>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        if (tg.requestFullscreen) {
            tg.requestFullscreen();
        }

        const params = new URLSearchParams(window.location.search);
        const tariff = params.get('tariff') || 'pro';
        const period = params.get('period') || 'month';
        const msg_id = params.get('msg_id') ? parseInt(params.get('msg_id')) : null;

        fetch('/api/create-crypto-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ init_data: tg.initData, tariff, period, currency: 'usd', msg_id }),
        })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.payment_url) {
                    window.location.replace(data.payment_url);
                } else {
                    tg.showAlert('Не удалось создать счёт. Попробуйте позже.', () => tg.close());
                }
            })
            .catch(() => {
                tg.showAlert('Ошибка соединения. Попробуйте позже.', () => tg.close());
            });
    </script>
</body>

</html>
